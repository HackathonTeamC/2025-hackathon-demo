spring:
  application:
    name: udb-manager
  datasource:
    url: jdbc:h2:file:./data/udbmanager
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

jasypt:
  encryptor:
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

app:
  query:
    timeout: 30
    max-rows: 1000
